name = "openpress"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# D1 Database (SQL at the edge) - create with: wrangler d1 create openpress-db
# [[d1_databases]]
# binding = "DB"
# database_name = "openpress-db"
# database_id = ""

# KV Namespace (caching) - create with: wrangler kv namespace create CACHE
# [[kv_namespaces]]
# binding = "CACHE"
# id = ""

# R2 Bucket (media storage) - create with: wrangler r2 bucket create openpress-media
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "openpress-media"
